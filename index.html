<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chefe">
  <title>Chefe — Seu Assistente Pessoal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      background: #0f0f0f;
      gap: 24px;
      padding: 40px 32px;
    }

    #login-screen.hidden { display: none; }

    .login-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8562a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      font-size: 14px;
      color: #666;
      text-align: center;
    }

    .login-box {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-box input {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px 18px;
      color: #f0f0f0;
      font-size: 16px;
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }

    .login-box input:focus {
      border-color: #f5a623;
    }

    .login-box input::placeholder { color: #444; }

    .btn-primary {
      background: linear-gradient(135deg, #f5a623, #e8562a);
      border: none;
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px;
      color: #f0f0f0;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .faceid-icon {
      font-size: 22px;
    }

    .login-error {
      color: #e8562a;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #444;
      font-size: 12px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a2a;
    }

    /* ── APP ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: #1a1a1a;
    }

    #app.visible { display: flex; }

    #header {
      padding: 16px 20px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8562a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #header-info { flex: 1; }
    #header-info h2 { font-size: 16px; font-weight: 600; }
    #header-info span { font-size: 12px; color: #4ade80; }

    .header-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .header-btn:hover { color: #e8562a; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #f5a623, #e8562a);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #2a2a2a;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    .date-divider {
      align-self: center;
      font-size: 11px;
      color: #555;
      background: #222;
      padding: 4px 12px;
      border-radius: 10px;
      margin: 4px 0;
    }

    #typing {
      display: none;
      align-self: flex-start;
    }

    #typing .bubble {
      background: #2a2a2a;
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #888;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 10px 16px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #2a2a2a;
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      color: #f0f0f0;
      font-size: 16px;
      resize: none;
      outline: none;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
      -webkit-appearance: none;
    }

    #input::placeholder { color: #555; }

    #mic-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #2a2a2a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      -webkit-tap-highlight-color: transparent;
    }

    #mic-btn.recording {
      background: #e8562a;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8562a);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:disabled { opacity: 0.4; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal.show { display: flex; }
    #modal-box {
      background: #222;
      border-radius: 16px;
      padding: 24px;
      width: 280px;
      text-align: center;
    }
    #modal-box h3 { font-size: 16px; margin-bottom: 8px; }
    #modal-box p { font-size: 13px; color: #888; margin-bottom: 20px; }
    #modal-box .btns { display: flex; gap: 10px; }
    #modal-box button {
      flex: 1; padding: 10px; border-radius: 10px;
      border: none; font-size: 14px; cursor: pointer; font-weight: 600;
    }
    #btn-cancel { background: #333; color: #f0f0f0; }
    #btn-confirm { background: linear-gradient(135deg, #f5a623, #e8562a); color: white; }

    #loading { align-self: center; color: #555; font-size: 13px; padding: 20px; }
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="login-avatar">👑</div>
  <div class="login-title">Chefe</div>
  <div class="login-subtitle" id="login-subtitle">Seu assistente pessoal</div>

  <div class="login-box">
    <div class="login-error" id="login-error"></div>

    <!-- Setup: criar senha -->
    <div id="setup-section">
      <input type="password" id="setup-pass" placeholder="Crie uma senha" autocomplete="new-password"/>
      <input type="password" id="setup-pass2" placeholder="Confirme a senha" autocomplete="new-password" style="margin-top:8px"/>
      <button class="btn-primary" id="btn-setup" style="margin-top:8px">Criar senha e entrar</button>
    </div>

    <!-- Login: senha + face id -->
    <div id="login-section" style="display:none; flex-direction:column; gap:12px;">
      <button class="btn-secondary" id="btn-faceid">
        <span class="faceid-icon">🔒</span> Entrar com Face ID
      </button>
      <div class="login-divider">ou</div>
      <input type="password" id="login-pass" placeholder="Digite sua senha" autocomplete="current-password"/>
      <button class="btn-primary" id="btn-login">Entrar</button>
    </div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <div id="header">
    <div id="avatar">👑</div>
    <div id="header-info">
      <h2>Chefe</h2>
      <span id="status">● carregando...</span>
    </div>
    <button class="header-btn" id="logout-btn" title="Sair">🔒</button>
    <button class="header-btn" id="clear-btn" title="Limpar histórico">🗑️</button>
  </div>

  <div id="messages">
    <div id="loading">Carregando histórico...</div>
    <div id="typing" class="msg bot">
      <div class="bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Manda uma mensagem..."></textarea>
    <button id="mic-btn">🎙️</button>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <h3>Limpar histórico?</h3>
    <p>Todas as conversas serão apagadas permanentemente da nuvem.</p>
    <div class="btns">
      <button id="btn-cancel">Cancelar</button>
      <button id="btn-confirm">Limpar</button>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = 'https://chefe-api.junior161080.workers.dev';
  const SUPA_URL   = 'https://xpoibyxprkfcrjtljqdh.supabase.co';
  const SUPA_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhwb2lieXhwcmtmY3JqdGxqcWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjYyNjgsImV4cCI6MjA5MDk0MjI2OH0.vX_5sXFaoUKluezIsJSNHqMo7Yf-u2c4DQm9lNwLfDw';

  const SYSTEM_PROMPT = `Você é o Chefe, um assistente pessoal casual e descontraído. 
Você fala de forma amigável, usa gírias leves do português brasileiro quando faz sentido, 
é direto ao ponto, bem-humorado e prestativo. Nunca é formal demais. 
Trate o usuário como um amigo próximo, mas seja sempre útil e confiável.
Responda sempre em português brasileiro.`;

  // ── AUTH ELEMENTS ──
  const loginScreen   = document.getElementById('login-screen');
  const loginSubtitle = document.getElementById('login-subtitle');
  const loginError    = document.getElementById('login-error');
  const setupSection  = document.getElementById('setup-section');
  const loginSection  = document.getElementById('login-section');
  const setupPass     = document.getElementById('setup-pass');
  const setupPass2    = document.getElementById('setup-pass2');
  const btnSetup      = document.getElementById('btn-setup');
  const loginPass     = document.getElementById('login-pass');
  const btnLogin      = document.getElementById('btn-login');
  const btnFaceid     = document.getElementById('btn-faceid');
  const logoutBtn     = document.getElementById('logout-btn');

  // ── APP ELEMENTS ──
  const appEl      = document.getElementById('app');
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const micBtn     = document.getElementById('mic-btn');
  const typingEl   = document.getElementById('typing');
  const clearBtn   = document.getElementById('clear-btn');
  const modal      = document.getElementById('modal');
  const btnCancel  = document.getElementById('btn-cancel');
  const btnConfirm = document.getElementById('btn-confirm');
  const statusEl   = document.getElementById('status');
  const loadingEl  = document.getElementById('loading');

  let apiHistory = [];
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  // ── HASH PASSWORD ──
  async function hashPassword(password) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── WEBAUTHN (Face ID) ──
  async function registerFaceID() {
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge,
          rp: { name: 'Chefe', id: location.hostname },
          user: { id: new Uint8Array(16), name: 'usuario', displayName: 'Usuário' },
          pubKeyCredParams: [{ type: 'public-key', alg: -7 }],
          authenticatorSelection: {
            authenticatorAttachment: 'platform',
            userVerification: 'required'
          },
          timeout: 60000
        }
      });
      if (cred) {
        localStorage.setItem('chefe_cred_id', btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
        return true;
      }
    } catch (e) {
      console.log('FaceID registro falhou:', e);
    }
    return false;
  }

  async function authenticateFaceID() {
    const credIdStr = localStorage.getItem('chefe_cred_id');
    if (!credIdStr) return false;
    try {
      const credId = Uint8Array.from(atob(credIdStr), c => c.charCodeAt(0));
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge,
          rpId: location.hostname,
          allowCredentials: [{ type: 'public-key', id: credId }],
          userVerification: 'required',
          timeout: 60000
        }
      });
      return !!assertion;
    } catch (e) {
      return false;
    }
  }

  // ── AUTH FLOW ──
  function checkFirstTime() {
    const hasPass = localStorage.getItem('chefe_pass');
    if (!hasPass) {
      setupSection.style.display = 'flex';
      setupSection.style.flexDirection = 'column';
      loginSection.style.display = 'none';
      loginSubtitle.textContent = 'Crie uma senha para proteger o Chefe';
    } else {
      setupSection.style.display = 'none';
      loginSection.style.display = 'flex';
      loginSubtitle.textContent = 'Bem-vindo de volta!';
      // Tenta Face ID automaticamente
      setTimeout(() => tryFaceID(), 500);
    }
  }

  async function tryFaceID() {
    const hasCred = localStorage.getItem('chefe_cred_id');
    if (!hasCred) return;
    btnFaceid.textContent = '🔒 Verificando...';
    const ok = await authenticateFaceID();
    if (ok) {
      enterApp();
    } else {
      btnFaceid.innerHTML = '<span class="faceid-icon">🔒</span> Entrar com Face ID';
    }
  }

  btnSetup.addEventListener('click', async () => {
    const p1 = setupPass.value;
    const p2 = setupPass2.value;
    if (p1.length < 4) { loginError.textContent = 'Senha muito curta (mín. 4 caracteres)'; return; }
    if (p1 !== p2) { loginError.textContent = 'As senhas não coincidem'; return; }
    loginError.textContent = '';
    const hash = await hashPassword(p1);
    localStorage.setItem('chefe_pass', hash);
    // Tenta registrar Face ID
    const faceOk = await registerFaceID();
    if (!faceOk) {
      loginError.textContent = 'Face ID não registrado, mas pode entrar com senha.';
    }
    enterApp();
  });

  btnLogin.addEventListener('click', async () => {
    const p = loginPass.value;
    const hash = await hashPassword(p);
    const saved = localStorage.getItem('chefe_pass');
    if (hash === saved) {
      loginError.textContent = '';
      enterApp();
    } else {
      loginError.textContent = 'Senha incorreta';
    }
  });

  btnFaceid.addEventListener('click', tryFaceID);

  logoutBtn.addEventListener('click', () => {
    appEl.classList.remove('visible');
    loginScreen.classList.remove('hidden');
    loginPass.value = '';
    loginError.textContent = '';
    apiHistory = [];
    Array.from(messagesEl.querySelectorAll('.msg:not(#typing), .date-divider')).forEach(el => el.remove());
    const newLoading = document.createElement('div');
    newLoading.id = 'loading';
    newLoading.textContent = 'Carregando histórico...';
    messagesEl.insertBefore(newLoading, typingEl);
  });

  function enterApp() {
    loginScreen.classList.add('hidden');
    appEl.classList.add('visible');
    loadHistory();
  }

  // ── SUPABASE ──
  async function supaFetch(path, options = {}) {
    const res = await fetch(`${SUPA_URL}/rest/v1${path}`, {
      ...options,
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
        ...options.headers
      }
    });
    if (!res.ok && res.status !== 204) throw new Error(await res.text());
    if (res.status === 204) return null;
    return res.json();
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const hoje = new Date();
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    if (d.toDateString() === hoje.toDateString()) return 'Hoje';
    if (d.toDateString() === ontem.toDateString()) return 'Ontem';
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderMessage(role, content, ts) {
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = `<div class="bubble">${content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><span class="timestamp">${formatTime(ts)}</span>`;
    messagesEl.insertBefore(div, typingEl);
  }

  function addDateDivider(label) {
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = label;
    messagesEl.insertBefore(div, typingEl);
  }

  async function loadHistory() {
    try {
      const data = await supaFetch('/mensagens?order=created_at.asc');
      const loading = document.getElementById('loading');
      if (loading) loading.remove();

      if (!data || data.length === 0) {
        await saveMessage('assistant', 'Fala! 👋 Sou o Chefe, seu assistente pessoal. Pode mandar ver — tô aqui pra ajudar no que precisar!');
        return;
      }

      let lastDate = '';
      for (const m of data) {
        const dateLabel = formatDate(m.created_at);
        if (dateLabel !== lastDate) { addDateDivider(dateLabel); lastDate = dateLabel; }
        renderMessage(m.role, m.content, m.created_at);
        apiHistory.push({ role: m.role, content: m.content });
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
      statusEl.textContent = '● online agora';
    } catch (e) {
      const loading = document.getElementById('loading');
      if (loading) loading.textContent = 'Erro ao carregar histórico.';
      statusEl.textContent = '● offline';
    }
  }

  async function saveMessage(role, content) {
    const ts = new Date().toISOString();
    try {
      await supaFetch('/mensagens', {
        method: 'POST',
        prefer: 'return=minimal',
        body: JSON.stringify({ role, content })
      });
    } catch (e) { console.error('Erro ao salvar:', e); }

    const dateLabel = formatDate(ts);
    const dividers = messagesEl.querySelectorAll('.date-divider');
    const lastDivider = dividers[dividers.length - 1];
    if (!lastDivider || lastDivider.textContent !== dateLabel) addDateDivider(dateLabel);

    renderMessage(role, content, ts);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    typingEl.style.display = 'flex';
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendText(text) {
    if (!text) return;
    sendBtn.disabled = true;
    micBtn.disabled = true;

    await saveMessage('user', text);
    apiHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: apiHistory
        })
      });

      const data = await response.json();
      const reply = data.content?.map(b => b.text || '').join('') || 'Eita, deu um problema aqui. Tenta de novo?';

      typingEl.style.display = 'none';
      await saveMessage('assistant', reply);
      apiHistory.push({ role: 'assistant', content: reply });
    } catch (e) {
      typingEl.style.display = 'none';
      await saveMessage('assistant', 'Ops, perdi a conexão por um segundo. Tenta de novo! 🙏');
    }

    sendBtn.disabled = false;
    micBtn.disabled = false;
  }

  async function transcribeAudio(blob) {
    statusEl.textContent = '● transcrevendo...';
    const formData = new FormData();
    formData.append('audio', blob, 'audio.webm');
    const response = await fetch(`${WORKER_URL}/transcribe`, { method: 'POST', body: formData });
    const data = await response.json();
    statusEl.textContent = '● online agora';
    return data.text || '';
  }

  async function toggleRecording() {
    if (isRecording) {
      mediaRecorder.stop();
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎙️';
    } else {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          micBtn.disabled = true;
          sendBtn.disabled = true;
          try {
            const text = await transcribeAudio(blob);
            if (text) await sendText(text);
          } catch (e) {
            await saveMessage('assistant', 'Não consegui transcrever o áudio. Tenta de novo! 🙏');
          }
          micBtn.disabled = false;
          sendBtn.disabled = false;
        };
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹️';
      } catch (e) {
        await saveMessage('assistant', 'Precisei de permissão para o microfone! Verifique as configurações do Safari. 🎙️');
      }
    }
  }

  sendBtn.addEventListener('click', async () => {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    await sendText(text);
  });

  micBtn.addEventListener('click', toggleRecording);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  inputEl.addEventListener('focus', () => {
    setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 300);
  });

  clearBtn.addEventListener('click', () => modal.classList.add('show'));
  btnCancel.addEventListener('click', () => modal.classList.remove('show'));
  btnConfirm.addEventListener('click', async () => {
    modal.classList.remove('show');
    try {
      await supaFetch('/mensagens?id=gte.0', { method: 'DELETE' });
      apiHistory = [];
      Array.from(messagesEl.querySelectorAll('.msg:not(#typing), .date-divider')).forEach(el => el.remove());
      await saveMessage('assistant', 'Histórico limpo! Começando do zero. 😊');
    } catch (e) { console.error('Erro ao limpar:', e); }
  });

  // ── INIT ──
  checkFirstTime();
</script>
</body>
</html>
