<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chefe">
  <title>Chefe — Seu Assistente Pessoal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: #1a1a1a;
    }

    #header {
      padding: 16px 20px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8562a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #header-info h2 { font-size: 16px; font-weight: 600; }
    #header-info span { font-size: 12px; color: #4ade80; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #f5a623, #e8562a);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #2a2a2a;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    #typing {
      display: none;
      align-self: flex-start;
    }

    #typing .bubble {
      background: #2a2a2a;
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #888;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 10px 16px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #2a2a2a;
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      color: #f0f0f0;
      font-size: 16px; /* 16px evita zoom automático no iOS */
      resize: none;
      outline: none;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
      -webkit-appearance: none;
    }

    #input::placeholder { color: #555; }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5a623, #e8562a);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">👑</div>
    <div id="header-info">
      <h2>Chefe</h2>
      <span>● online agora</span>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bubble">Fala! 👋 Sou o Chefe, seu assistente pessoal. Pode mandar ver — tô aqui pra ajudar no que precisar!</div>
      <span class="timestamp">agora</span>
    </div>
    <div id="typing" class="msg bot">
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Manda uma mensagem..."></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const typingEl   = document.getElementById('typing');

  const SYSTEM_PROMPT = `Você é o Chefe, um assistente pessoal casual e descontraído. 
Você fala de forma amigável, usa gírias leves do português brasileiro quando faz sentido, 
é direto ao ponto, bem-humorado e prestativo. Nunca é formal demais. 
Trate o usuário como um amigo próximo, mas seja sempre útil e confiável.
Responda sempre em português brasileiro.`;

  let history = [];

  function getTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text) {
    typingEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = `<div class="bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><span class="timestamp">${getTime()}</span>`;
    messagesEl.insertBefore(div, typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    typingEl.style.display = 'flex';
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await response.json();
      const reply = data.content?.map(b => b.text || '').join('') || 'Eita, deu um problema aqui. Tenta de novo?';

      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    } catch (e) {
      typingEl.style.display = 'none';
      addMessage('bot', 'Ops, perdi a conexão por um segundo. Tenta de novo! 🙏');
    }

    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  // Scroll para o fim quando teclado abre no iOS
  inputEl.addEventListener('focus', () => {
    setTimeout(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 300);
  });
</script>
</body>
</html>
